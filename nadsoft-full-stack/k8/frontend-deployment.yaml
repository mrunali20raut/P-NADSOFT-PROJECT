apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-deployment
  namespace: nadsoft

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: pranav7820/nadsoft-frontend:latest

        ports:
        - containerPort: 3000